# Chamber Configuration File
# Multi-Model AI Application Settings

# Orchestrator Model (coordinates reasoning and synthesis)
orchestrator:
  provider: "anthropic"  # anthropic, gemini, ollama, xai
  model: "claude-sonnet-4-5"
  temperature: 0.7
  max_tokens: 4096

# Reasoning Models (parallel reasoning)
reasoning_models:
  - name: "claude-opus"
    provider: "anthropic"
    model: "claude-opus-4-5"
    enabled: true
    temperature: 0.7
    max_tokens: 4096

  - name: "gemini-thinking"
    provider: "gemini"
    model: "gemini-2.0-flash-thinking-exp"
    enabled: true
    temperature: 0.7
    max_tokens: 4096

  - name: "grok"
    provider: "xai"
    model: "grok-beta"
    enabled: false
    temperature: 0.7
    max_tokens: 4096

# Tool Configuration
tools:
  enabled_tools:
    - web_search
    - calculator
    - file_ops
  approval_required: true
  approval_timeout_seconds: 300

# Workspace Configuration
workspace:
  path: "${HOME}/.chamber/workspace"
  sessions_dir: "sessions"
  config_dir: "config"

# Python Sidecar Configuration
sidecar:
  host: "127.0.0.1"
  port: 8765
  health_check_interval_seconds: 30
  max_restart_attempts: 3
